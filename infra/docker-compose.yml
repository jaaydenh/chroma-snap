# Future self-hosting/development scaffold. The current code path does not require these services yet.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: chroma_snap
      POSTGRES_PASSWORD: chroma_snap
      POSTGRES_DB: chroma_snap
    ports:
      - "5432:5432"
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: chroma_snap
      MINIO_ROOT_PASSWORD: chroma_snap_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
  redis:
    image: redis:8
    ports:
      - "6379:6379"
